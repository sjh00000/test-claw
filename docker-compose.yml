services:
  site-mysql:
    # 站点级 MySQL 容器，统一承载 AI 项目和博客等多个业务库。
    image: mysql:8.4
    container_name: site-mysql
    # 除非手动停止或删除容器，否则 Docker 重启后自动拉起数据库。
    restart: unless-stopped
    environment:
      # 设置容器时区，保证数据库时间与应用日志都使用北京时间。
      TZ: Asia/Shanghai
      # 以下变量只在 MySQL 数据卷首次初始化时生效，用于创建 root 密码、业务库和业务用户。
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      # 统一使用 utf8mb4，避免中文、表情或特殊字符写入时乱码。
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      # MySQL 容器内默认时区设置为东八区，避免 created_at / updated_at 出现时差。
      - --default-time-zone=+08:00
    ports:
      # 暴露给宿主机，方便本机或 Navicat 直连服务器数据库。
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      # 数据库文件落到 Docker volume，容器重建后业务数据不会丢。
      - mysql_data:/var/lib/mysql
    networks:
      # 加入站点共享网络，业务容器可通过服务名 site-mysql 访问它。
      - site_net
    healthcheck:
      # 等 MySQL 真正可连接后，再允许后端容器启动，减少启动顺序导致的连接失败。
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  site-redis:
    # 站点级 Redis，当前用于 AI 生成任务防重分布式锁，后续其他服务也可复用。
    image: redis:7.2-alpine
    container_name: site-redis
    restart: unless-stopped
    # 开启 AOF 持久化，避免 Redis 容器重启后锁相关数据完全丢失。
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      # Redis 数据落到 Docker volume，容器重建后仍可保留持久化文件。
      - redis_data:/data
    networks:
      - site_net
    healthcheck:
      # 等 Redis 可以响应 ping 后，再允许后端容器启动。
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  aigen-api:
    # Spring Boot 后端镜像在服务器本地构建，不把 application*.yml 真实配置打进镜像。
    build:
      context: .
      dockerfile: Dockerfile
    image: aigen-api:latest
    container_name: aigen-api
    restart: unless-stopped
    # Docker/服务器环境启用 prod 配置，只读取 application-prod.yml 中的 MySQL/Redis 服务名。
    command: ["--spring.profiles.active=prod"]
    volumes:
      # 公共应用配置只读挂载进容器，便于改配置后重启生效，不需要重建镜像。
      - ./src/main/resources/application.yml:/app/config/application.yml:ro
      # prod 环境连接 Docker 网络内的 site-mysql / site-redis 服务名。
      - ./src/main/resources/application-prod.yml:/app/config/application-prod.yml:ro
    depends_on:
      # 后端必须等 MySQL 和 Redis 健康检查通过后再启动。
      site-mysql:
        condition: service_healthy
      site-redis:
        condition: service_healthy
    networks:
      site_net:
        aliases:
          # 给 Nginx 反向代理使用，frontend/nginx.conf 里通过 http://aigen-api:8080 访问后端。
          - aigen-api

  aigen-web:
    # 前端镜像包含 Vue 打包产物和 Nginx 网关配置。
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aigen-web:latest
    container_name: aigen-web
    restart: unless-stopped
    ports:
      # 对外暴露网站入口，默认宿主机 80 -> 容器 80。
      - "${WEB_HTTP_PORT:-80}:80"
      # HTTPS 入口，证书由 Let's Encrypt 写入宿主机 /etc/letsencrypt 后只读挂载。
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      # Nginx 访问日志挂到宿主机，供限流黑名单脚本读取。
      - ./docker-data/nginx/logs:/var/log/nginx
      # ACME HTTP-01 校验文件目录，certbot 写入后由 Nginx 对外暴露。
      - ./docker-data/certbot/www:/var/www/certbot
      # Let's Encrypt 证书目录只读挂载，避免 Web 容器误改证书文件。
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Nginx 站点配置运行时挂载，命名、限流或反代调整后重启 Web 容器即可生效。
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      # Nginx 依赖后端容器存在；接口可用性由反向代理转发到 app 服务。
      - aigen-api
    networks:
      - site_net

volumes:
  mysql_data:
    # 固定 volume 名称，避免项目目录变化导致 Docker 创建新数据卷。
    name: site-mysql-data
  redis_data:
    # 固定 volume 名称，便于排查和备份 Redis 持久化文件。
    name: site-redis-data

networks:
  site_net:
    # 固定网络名称，方便容器之间通过服务名互相访问，也便于手动排查网络。
    name: site-net
