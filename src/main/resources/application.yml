spring:
  application:
    name: keyframe-video-studio
  datasource:
    # MySQL 用于持久化用户信息，keyframe_video_studio 库已通过 SQL 初始化。
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/keyframe_video_studio?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: keyframe-video-studio-pool
      maximum-pool-size: ${MYSQL_MAX_POOL_SIZE:10}
      minimum-idle: ${MYSQL_MIN_IDLE:2}
      connection-timeout: ${MYSQL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${MYSQL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${MYSQL_MAX_LIFETIME_MS:1800000}
  data:
    redis:
      # Redis 仅用于生成任务提交防重的分布式锁，后续多实例部署时共享同一把用户维度锁。
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT_MS:2000ms}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      encoding: UTF-8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  # 后端 API 端口，前端 Vite 通过 /api 代理到这里。
  port: 8080

auth:
  jwt:
    # JWT 签名密钥，本地开发有默认值；部署环境建议通过 AUTH_JWT_SECRET 覆盖。
    secret: ${AUTH_JWT_SECRET:keyframe-video-studio-jwt-secret}

generation:
  image-provider:
    # gpt-image2 厂商网关域名，由部署环境配置。
    base-url: ${GPT_IMAGE2_BASE_URL:}
    # gpt-image2 厂商密钥，由部署环境配置，禁止写死在配置文件。
    api-key: ${GPT_IMAGE2_API_KEY:}
    # 图片生成模型名称，由部署环境配置。
    model: ${GPT_IMAGE2_MODEL:}
    # 图片编辑接口路径，对应 image2 示例中的 /v1/images/edits。
    edit-endpoint: ${GPT_IMAGE2_EDIT_ENDPOINT:/v1/images/edits}
    # 图片生成接口路径，用于先生成主体/角色参考图。
    generation-endpoint: ${GPT_IMAGE2_GENERATION_ENDPOINT:/v1/images/generations}
    # image2 输出尺寸。
    size: ${GPT_IMAGE2_SIZE:1024x1024}
    # image2 输出质量。
    quality: ${GPT_IMAGE2_QUALITY:medium}
    # image-2 单次调用超时时间，超过后该帧可重新生成。
    request-timeout-seconds: ${GPT_IMAGE2_REQUEST_TIMEOUT_SECONDS:600}
  seedance:
    # Seedance 文档中的 BASE_URL，由部署环境配置；未配置时启用 mock 视频任务。
    base-url: ${SEEDANCE_BASE_URL:}
    # Seedance Bearer Token，由部署环境配置，禁止写死在配置文件。
    api-key: ${SEEDANCE_API_KEY:}
    # 标准视频生成模型，由部署环境配置。
    model: ${SEEDANCE_MODEL:}
    # 后端建议轮询间隔，保留给后续前端动态读取。
    poll-interval-seconds: ${SEEDANCE_POLL_INTERVAL_SECONDS:15}
  oss:
    # OSS SDK 上传 Endpoint，不带 bucket 名。
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-chengdu.aliyuncs.com}
    # OSS AccessKeyId，由部署环境配置。
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    # OSS AccessKeySecret 必须通过部署环境配置，禁止写死。
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    # OSS 存储空间名称。
    bucket-name: ${ALIYUN_OSS_BUCKET_NAME:videos-sun}
    # OSS Bucket 域名，用于保存可访问结果地址。
    bucket-domain: ${ALIYUN_OSS_BUCKET_DOMAIN:https://videos-sun.oss-cn-chengdu.aliyuncs.com}
    # 生成结果在 OSS 中的统一目录前缀。
    object-prefix: ${ALIYUN_OSS_OBJECT_PREFIX:test-claw}
  task:
    # 任务 ID 使用紧凑雪花算法，多实例部署时每个实例配置不同 workerId，范围 0-15。
    worker-id: ${GENERATION_TASK_WORKER_ID:1}
