<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 审查后台</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f8f2ea, #eee0cf);
      color: #24180f;
    }
    .card {
      width: min(560px, calc(100% - 32px));
      padding: 28px;
      border-radius: 24px;
      background: rgba(255, 250, 244, 0.92);
      border: 1px solid #e6d9ca;
      text-align: center;
      box-shadow: 0 18px 60px rgba(69, 40, 19, 0.08);
    }
    a {
      color: #7e3117;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
<main class="card">
  <h1>正在进入 OpenClaw 审查后台</h1>
  <p id="jump-text">如果没有自动跳转，请点击 <a id="jump-link" href="/review-admin.html">这里</a>。</p>
</main>

<script>
  const target = window.location.port === '63342'
    ? 'http://localhost:8080/review-admin.html'
    : `${window.location.origin}/review-admin.html`;

  const link = document.getElementById('jump-link');
  link.href = target;
  window.location.replace(target);
</script>
</body>
</html>
