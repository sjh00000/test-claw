spring:
  datasource:
    # prod 在 Docker 网络内通过服务名访问 MySQL；账号密码要与 .env 中的 MySQL 初始化参数保持一致。
    url: jdbc:mysql://site-mysql:3306/aigen_studio?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: aigen_app
    password: change-me-db-password
  data:
    redis:
      # prod 在 Docker 网络内通过服务名访问 Redis。
      host: site-redis
      port: 6379
      password:
      database: 0
      timeout: 2000ms
