# 普通 API 限流区：按客户端 IP 统计，适合管理页查询、任务列表等轻量接口。
limit_req_zone $binary_remote_addr zone=aigen_api_limit:20m rate=10r/s;
# 登录接口限流区：降低撞库和暴力尝试速度。
limit_req_zone $binary_remote_addr zone=aigen_login_limit:10m rate=10r/m;
# 生成接口限流区：一分钟 10 次，避免高成本任务被同一 IP 高频提交。
limit_req_zone $binary_remote_addr zone=aigen_generation_limit:10m rate=10r/m;
# 单 IP 并发连接限制区：限制同一来源同时占用过多连接。
limit_conn_zone $binary_remote_addr zone=aigen_per_ip_conn:10m;

# 被限流或超过连接数时返回 429，黑名单脚本可基于 access.log 识别异常 IP。
limit_req_status 429;
limit_conn_status 429;

server {
    # 域名 HTTP 入口仅用于 Let's Encrypt 校验，其余请求统一跳转 HTTPS。
    listen 80;
    server_name sjhibqi.cn blog.sjhibqi.cn;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # 保留 IP 直连 HTTP 兼容入口，避免没有 Host 或安全组排查时完全不可访问。
    listen 80 default_server;
    server_name 101.37.203.5 _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    client_max_body_size 120m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 20s;
    send_timeout 30s;

    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 444;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location = /api/auth/login {
        limit_req zone=aigen_login_limit burst=5 nodelay;
        limit_conn aigen_per_ip_conn 5;

        proxy_pass http://aigen-api:8080/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 同源页面经 HTTPS 反代到容器内 HTTP 时会带 Origin，清掉后避免后端误判为非法跨域。
        proxy_set_header Origin "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /api/generation/ {
        limit_req zone=aigen_generation_limit burst=4 nodelay;
        limit_conn aigen_per_ip_conn 3;

        proxy_pass http://aigen-api:8080/api/generation/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 同源页面经 HTTPS 反代到容器内 HTTP 时会带 Origin，清掉后避免后端误判为非法跨域。
        proxy_set_header Origin "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/ {
        limit_req zone=aigen_api_limit burst=30 nodelay;
        limit_conn aigen_per_ip_conn 15;

        proxy_pass http://aigen-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 同源页面经 HTTPS 反代到容器内 HTTP 时会带 Origin，清掉后避免后端误判为非法跨域。
        proxy_set_header Origin "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        limit_req zone=aigen_api_limit burst=60 nodelay;
        limit_conn aigen_per_ip_conn 30;

        try_files $uri $uri/ /index.html;
    }
}

server {
    # AI 主站 HTTPS 入口。
    listen 443 ssl;
    http2 on;
    server_name sjhibqi.cn;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/sjhibqi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sjhibqi.cn/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 120m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 20s;
    send_timeout 30s;

