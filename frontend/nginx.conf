server {
    # 博客 HTTPS 入口，内部继续反代到 Typecho 容器 80。
    listen 443 ssl;
    http2 on;
    server_name blog.sjhibqi.cn;

    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/sjhibqi.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sjhibqi.cn/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://blog-typecho:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
