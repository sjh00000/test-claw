limit_req_zone $binary_remote_addr zone=testclaw_api_limit:20m rate=10r/s;
limit_req_zone $binary_remote_addr zone=testclaw_login_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=testclaw_generation_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=testclaw_per_ip_conn:10m;

limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    client_max_body_size 120m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 20s;
    send_timeout 30s;

    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 444;
    }

    location = /api/auth/login {
        limit_req zone=testclaw_login_limit burst=5 nodelay;
        limit_conn testclaw_per_ip_conn 5;

        proxy_pass http://app:8080/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /api/generation/ {
        limit_req zone=testclaw_generation_limit burst=4 nodelay;
        limit_conn testclaw_per_ip_conn 3;

        proxy_pass http://app:8080/api/generation/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/ {
        limit_req zone=testclaw_api_limit burst=30 nodelay;
        limit_conn testclaw_per_ip_conn 15;

        proxy_pass http://app:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        limit_req zone=testclaw_api_limit burst=60 nodelay;
        limit_conn testclaw_per_ip_conn 30;

        try_files $uri $uri/ /index.html;
    }
}
