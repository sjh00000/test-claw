# 普通 API 限流区：按客户端 IP 统计，适合管理页查询、任务列表等轻量接口。
limit_req_zone $binary_remote_addr zone=testclaw_api_limit:20m rate=10r/s;
# 登录接口限流区：降低撞库和暴力尝试速度。
limit_req_zone $binary_remote_addr zone=testclaw_login_limit:10m rate=10r/m;
# 生成接口限流区：一分钟 10 次，避免高成本任务被同一 IP 高频提交。
limit_req_zone $binary_remote_addr zone=testclaw_generation_limit:10m rate=10r/m;
# 单 IP 并发连接限制区：限制同一来源同时占用过多连接。
limit_conn_zone $binary_remote_addr zone=testclaw_per_ip_conn:10m;

# 被限流或超过连接数时返回 429，黑名单脚本可基于 access.log 识别异常 IP。
limit_req_status 429;
limit_conn_status 429;

server {
    # Web 容器内部监听 80，宿主机端口由 docker-compose 的 WEB_HTTP_PORT 映射。
    listen 80;
    server_name _;

    # Vue 构建产物所在目录。
    root /usr/share/nginx/html;
    index index.html;
    # 不暴露 Nginx 版本信息，减少无意义的指纹暴露。
    server_tokens off;

    # 允许上传参考图；超时配置用于快速释放异常慢连接。
    client_max_body_size 120m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 20s;
    send_timeout 30s;

    # 拦截项目不需要的 HTTP 方法，异常方法直接断开连接。
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
        return 444;
    }

    location = /api/auth/login {
        # 登录单独限流，允许少量突发请求但不排队等待。
        limit_req zone=testclaw_login_limit burst=5 nodelay;
        # 同一 IP 登录接口最多 5 个并发连接。
        limit_conn testclaw_per_ip_conn 5;

        # app 是 docker-compose 中给后端容器设置的网络别名。
        proxy_pass http://app:8080/api/auth/login;
        proxy_http_version 1.1;
        # 透传真实客户端信息，后端日志和后续风控可识别来源 IP。
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 登录接口预期较快，超时保持相对短。
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ^~ /api/generation/ {
        # 生成接口成本最高，按一分钟 10 次限制，突发 4 次直接处理但不排队。
        limit_req zone=testclaw_generation_limit burst=4 nodelay;
        # 同一 IP 生成接口最多 3 个并发连接，减少长耗时任务挤占后端线程。
        limit_conn testclaw_per_ip_conn 3;

        proxy_pass http://app:8080/api/generation/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 图片/视频生成和任务查询可能耗时较长，代理超时放宽到 600 秒。
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /api/ {
        # 其他 API 使用普通限流，兼顾管理页面筛选、刷新等正常操作。
        limit_req zone=testclaw_api_limit burst=30 nodelay;
        # 普通 API 同一 IP 最多 15 个并发连接。
        limit_conn testclaw_per_ip_conn 15;

        proxy_pass http://app:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        # 静态页面也做轻量限流，避免刷新攻击直接压垮 Nginx。
        limit_req zone=testclaw_api_limit burst=60 nodelay;
        # 页面和静态资源同一 IP 最多 30 个并发连接。
        limit_conn testclaw_per_ip_conn 30;

        # Vue 使用 history 路由，刷新 /admin/users 等路径时回退到 index.html。
        try_files $uri $uri/ /index.html;
    }
}
